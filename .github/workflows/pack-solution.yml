name: Pack Contoso_University_Core

on:
  push:
    paths:
      - contents/**
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      # Step 1: Check out repository code
      - uses: actions/checkout@v4

      # Step 2: Install Power Platform Tools (required for @v1)
      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      # Step 3: Pack the Power Platform solution
      - name: Pack Solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-file: out/contoso_university_core.zip
          solution-folder: contents
          solution-type: Both

      # Step 4: Upload the packed solution as a build artifact
      - name: Upload Packed Solution
        uses: actions/upload-artifact@v4
        with:
          name: packed-solution
          path: out/